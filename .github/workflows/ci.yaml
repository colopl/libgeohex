name: CI
on:
  push:
    branches:
        - main
  pull_request:
jobs:
  Approval:
    runs-on: ubuntu-latest
    environment: ${{ github.event.pull_request.user.login == 'renovate[bot]' && 'renovate-ci-approval' || '' }}
    steps:
      - name: Approved
        run: echo "CI execution approved (or no approval gate required for this event)."
  Linux:
    needs: Approval
    name: Linux (${{ matrix.display_platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_platform: linux/amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            native_platform: linux/amd64
            qemu_platforms: ""
            run_sanitizers: "true"
          - display_platform: linux/arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            native_platform: linux/arm64
            qemu_platforms: ""
            run_sanitizers: "true"
          - display_platform: linux/s390x
            platform: linux/s390x
            runner: ubuntu-24.04
            native_platform: linux/amd64
            qemu_platforms: s390x
            run_sanitizers: "false"
          - display_platform: linux/arm/v7
            platform: linux/arm/v7
            runner: ubuntu-24.04
            native_platform: linux/amd64
            qemu_platforms: arm
            run_sanitizers: "false"
          - display_platform: linux/i386
            platform: linux/386
            runner: ubuntu-24.04
            native_platform: linux/amd64
            qemu_platforms: "386"
            run_sanitizers: "false"
    steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            submodules: true
        - name: Setup QEMU
          if: matrix.qemu_platforms != ''
          uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
          with:
            platforms: ${{ matrix.qemu_platforms }}
        - name: Setup buildx
          uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        - name: Build container
          run: |
            docker buildx build \
              --pull \
              --no-cache \
              --load \
              --platform "${{ matrix.platform }}" \
              --build-arg PLATFORM="${{ matrix.platform }}" \
              --tag "test" \
              .
        - name: Test
          run: |
            docker run \
              --platform "${{ matrix.platform }}" \
              --privileged \
              --cap-add SYS_ADMIN \
              --security-opt seccomp:unconfined \
              -e NATIVE_PLATFORM="${{ matrix.native_platform }}" \
              -e RUN_SANITIZERS="${{ matrix.run_sanitizers }}" \
              -v "$(pwd):/workspaces/libgeohex" \
              -w "/workspaces/libgeohex" \
              -i "test" \
              ./ci.sh
  macOS:
    needs: Approval
    runs-on: macos-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            fetch-depth: 1
        - name: Configure
          run: cmake -S . -B build -DBUILD_TESTS=ON
        - name: Build
          run: cmake --build build --parallel
        - name: Test
          run: ctest --test-dir build --output-on-failure
  Windows:
    needs: Approval
    runs-on: windows-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            fetch-depth: 1
        - name: Configure
          run: cmake -S . -B build -DBUILD_TESTS=ON
        - name: Build
          run: cmake --build build --config Debug --parallel
        - name: Test
          run: ctest --test-dir build --build-config Debug --output-on-failure
